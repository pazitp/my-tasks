# שולח תזכורות למשימות + סיכום בוקר יומי, דרך Firebase Cloud Messaging.
# מתוזמן כל 5 דקות — בפועל GitHub מריץ בתדירות נמוכה יותר ועם איחורים,
# אז תזמון צפוף יותר משפר את הסיכוי שתזכורות יישלחו קרוב לזמנן.
name: reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

concurrency:
  group: reminders
  cancel-in-progress: false

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install firebase-admin@12 --no-save --no-audit --no-fund
        working-directory: scripts
      - run: node send-reminders.js
        working-directory: scripts
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
